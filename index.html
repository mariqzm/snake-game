<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Snake</h1>
  <div class="hud">SCORE:&nbsp;<span id="score">0</span>&nbsp;&nbsp;&nbsp;BEST:&nbsp;<span id="best">0</span></div>
  <div class="wrapper">
    <canvas id="canvas"></canvas>
    <div class="controls">
    <button class="btn up" data-dir="UP">&#8593;</button>
    <button class="btn left" data-dir="LEFT">&#8592;</button>
    <button class="btn down" data-dir="DOWN">&#8595;</button>
    <button class="btn right" data-dir="RIGHT">&#8594;</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
